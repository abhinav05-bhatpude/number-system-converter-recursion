<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Number System Converter</title>
  <link rel="stylesheet" href="style.css">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <div class="card">

    <h1>🔢 Number Converter</h1>
    <p class="subtitle">Convert numbers using recursion</p>

    <div class="input-box">
      <input id="numberInput" type="text" placeholder="Enter number">
    </div>

    <div class="input-box">
      <select id="typeSelect">
        <option value="binary">Decimal → Binary</option>
        <option value="octal">Decimal → Octal</option>
        <option value="hex">Decimal → Hex</option>
        <option value="binaryToDecimal">Binary → Decimal</option>
      </select>
    </div>

    <button id="convertBtn">Convert</button>

    <div id="output" class="output-box"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
